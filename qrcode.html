<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约二维码 - 德江县朗声语言培训学校</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 25px;
            border: 3px solid #f0f0f0;
        }

        #qrcode {
            display: block;
        }

        #qrcode canvas {
            display: block;
        }

        .info {
            margin-bottom: 25px;
        }

        .info h2 {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .info p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .url-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            word-break: break-all;
            font-size: 0.85rem;
            color: #667eea;
            font-family: monospace;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .instructions {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #f0f0f0;
            text-align: left;
        }

        .instructions h3 {
            color: #333;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .instructions ol {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.8;
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
        }

        .admin-link a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .admin-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 400px) {
            .card {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>德江县朗声语言培训学校</h1>
            <p>稿件指导预约系统</p>
        </div>

        <div class="card">
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>

            <div class="info">
                <h2>扫码预约稿件指导</h2>
                <p>家长扫描上方二维码即可进入预约页面</p>
            </div>

            <div class="url-box" id="urlBox"></div>

            <div class="actions">
                <button class="btn btn-primary" onclick="downloadQR()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    下载二维码图片
                </button>
                <button class="btn btn-secondary" onclick="copyLink()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    复制预约链接
                </button>
                <button class="btn btn-secondary" onclick="location.href='admin.html'">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    进入后台管理
                </button>
            </div>

            <div class="instructions">
                <h3>📋 使用说明</h3>
                <ol>
                    <li>将二维码图片发送给家长群或打印出来</li>
                    <li>家长扫描二维码即可打开预约页面</li>
                    <li>选择合适的日期和时间段进行预约</li>
                    <li>预约成功后，系统会自动提醒上课时间</li>
                </ol>
            </div>
        </div>

        <div class="admin-link">
            <a href="index.html">返回预约页面</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 获取当前页面URL作为预约链接
        const bookingUrl = window.location.href.replace('qrcode.html', 'index.html');
        
        document.getElementById('urlBox').textContent = bookingUrl;

        // 生成二维码
        QRCode.toCanvas(document.createElement('canvas'), bookingUrl, {
            width: 200,
            margin: 2,
            color: {
                dark: '#333333',
                light: '#ffffff'
            }
        }, function(error, canvas) {
            if (error) {
                console.error(error);
                return;
            }
            document.getElementById('qrcode').appendChild(canvas);
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('二维码生成中，请稍候...');
                return;
            }

            // 创建带有logo的下载版本
            const link = document.createElement('a');
            link.download = `朗声语言预约二维码_${new Date().toISOString().split('T')[0]}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            showToast('二维码图片已下载！');
        }

        function copyLink() {
            navigator.clipboard.writeText(bookingUrl).then(() => {
                showToast('预约链接已复制到剪贴板！');
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = bookingUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('预约链接已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
