<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 德江县朗声语言培训学校</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 登录页面样式 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-error {
            background: #fee;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 管理页面样式 */
        .admin-content {
            display: none;
        }

        .admin-content.show {
            display: block;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
            font-family: inherit;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .header-btn.back {
            background: rgba(255,255,255,0.15);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
        }

        .stat-card .sub {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .stat-card.purple .value {
            color: #667eea;
        }

        .stat-card.green .value {
            color: #27ae60;
        }

        .stat-card.orange .value {
            color: #f39c12;
        }

        .main-content {
            padding: 0 30px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: #666;
            font-size: 0.9rem;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .booking-list {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .booking-item {
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 20px;
            align-items: center;
            transition: background 0.3s;
        }

        .booking-item:hover {
            background: #f8f9fa;
        }

        .booking-item:last-child {
            border-bottom: none;
        }

        .booking-info h4 {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .booking-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .booking-date {
            text-align: center;
        }

        .booking-date .date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .booking-date .time {
            color: #667eea;
            font-weight: 500;
            margin-top: 5px;
        }

        .booking-contact p {
            color: #666;
            font-size: 0.9rem;
            margin: 3px 0;
        }

        .booking-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            fill: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-upcoming {
            background: #e8f5e9;
            color: #27ae60;
        }

        .badge-reminded {
            background: #fff3e0;
            color: #f39c12;
        }

        .reminder-section {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .reminder-section h3 {
            color: #856404;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reminder-list {
            display: grid;
            gap: 10px;
        }

        .reminder-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reminder-info {
            color: #333;
        }

        .reminder-info strong {
            color: #667eea;
        }

        .reminder-info p {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 900px) {
            .booking-item {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .booking-date {
                text-align: left;
            }

            .booking-date .time {
                margin-top: 0;
            }

            .booking-actions {
                justify-content: flex-start;
            }

            .stats {
                padding: 20px;
            }

            .main-content {
                padding: 0 20px 20px;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="login-header">
                <h1>管理后台登录</h1>
                <p>朗声艺术培训中心二校区陈娜老师</p>
            </div>
            <div class="login-error" id="loginError">账号或密码错误，请重试</div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>管理员账号</label>
                    <input type="text" id="loginAccount" placeholder="请输入管理员账号" required>
                </div>
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入登录密码" required>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="login-footer">
                <a href="index.html">返回预约页面</a>
            </div>
        </div>
    </div>

    <!-- 管理页面 -->
    <div class="admin-content" id="adminPage">
        <div class="header">
            <h1>📋 预约管理后台</h1>
            <div class="header-actions">
                <button class="header-btn back" onclick="location.href='qrcode.html'">📱 二维码</button>
                <button class="header-btn back" onclick="location.href='index.html'">🏠 预约页面</button>
                <button class="header-btn" onclick="exportData()">📥 导出数据</button>
                <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card purple">
                <h3>总预约数</h3>
                <div class="value" id="totalBookings">0</div>
                <div class="sub">4月14日 - 4月23日</div>
            </div>
            <div class="stat-card green">
                <h3>今日预约</h3>
                <div class="value" id="todayBookings">0</div>
                <div class="sub" id="todayDate"></div>
            </div>
            <div class="stat-card">
                <h3>剩余名额</h3>
                <div class="value" id="remainingSlots">0</div>
                <div class="sub">共30个时段</div>
            </div>
            <div class="stat-card orange">
                <h3>已设置提醒</h3>
                <div class="value" id="remindedCount">0</div>
                <div class="sub">自动提醒家长</div>
            </div>
        </div>

        <div class="main-content">
            <div class="reminder-section" id="reminderSection">
                <h3>⏰ 即将上课提醒</h3>
                <div class="reminder-list" id="upcomingReminders"></div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>日期筛选</label>
                    <select id="filterDate">
                        <option value="">全部日期</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>时段筛选</label>
                    <select id="filterSlot">
                        <option value="">全部时段</option>
                        <option value="18:00">18:00-19:00</option>
                        <option value="19:00">19:00-20:00</option>
                        <option value="20:00">20:00-21:00</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>搜索</label>
                    <input type="text" id="searchKeyword" placeholder="孩子姓名/家长姓名/电话">
                </div>
                <button class="btn btn-primary" onclick="applyFilters()">应用筛选</button>
                <button class="btn" onclick="resetFilters()">重置</button>
            </div>

            <div class="booking-list" id="bookingList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <h3>暂无预约数据</h3>
                    <p>等待家长预约...</p>
                </div>
            </div>
        </div>

        <div class="modal" id="deleteModal">
            <div class="modal-content">
                <h2>确认删除</h2>
                <p id="deleteMessage">确定要删除这条预约记录吗？</p>
                <div class="modal-actions">
                    <button class="btn" onclick="closeDeleteModal()">取消</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'langsheng_bookings';
        const ADMIN_KEY = 'langsheng_admin_logged';
        const START_DATE = new Date('2026-04-14');
        const END_DATE = new Date('2026-04-23');

        // 管理员账号密码
        const ADMIN_ACCOUNT = '18311831302';
        const ADMIN_PASSWORD = 'wxd993';

        let allBookings = [];
        let deleteTargetId = null;

        function init() {
            // 检查是否已登录
            if (localStorage.getItem(ADMIN_KEY) === 'true') {
                showAdminPage();
            } else {
                showLoginPage();
            }
        }

        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').classList.remove('show');
        }

        function showAdminPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').classList.add('show');
            loadBookings();
            renderStats();
            renderDateFilters();
            renderUpcomingReminders();
            renderBookingList();
        }

        function logout() {
            localStorage.removeItem(ADMIN_KEY);
            showLoginPage();
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (account === ADMIN_ACCOUNT && password === ADMIN_PASSWORD) {
                localStorage.setItem(ADMIN_KEY, 'true');
                document.getElementById('loginError').style.display = 'none';
                showAdminPage();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginPassword').value = '';
            }
        });

        function loadBookings() {
            try {
                allBookings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                allBookings = [];
            }
        }

        function saveBookings() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allBookings));
        }

        function getWeekdayName(date) {
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return days[date.getDay()];
        }

        function renderStats() {
            const totalSlots = 10 * 3; // 10天 * 3个时段
            document.getElementById('totalBookings').textContent = allBookings.length;
            document.getElementById('remainingSlots').textContent = totalSlots - allBookings.length;
            
            const today = '2026-04-13';
            const todayBookings = allBookings.filter(b => {
                const bookingDate = new Date(b.date);
                const todayDate = new Date(today);
                return bookingDate.toDateString() === todayDate.toDateString();
            });
            document.getElementById('todayBookings').textContent = todayBookings.length;
            
            const todayFormatted = new Date(today);
            document.getElementById('todayDate').textContent = `4月${todayFormatted.getDate()}日 ${getWeekdayName(todayFormatted)}`;
            
            const remindedCount = allBookings.filter(b => b.reminderSet).length;
            document.getElementById('remindedCount').textContent = remindedCount;
        }

        function renderDateFilters() {
            const select = document.getElementById('filterDate');
            const current = new Date(START_DATE);
            
            while (current <= END_DATE) {
                const dateStr = current.toISOString().split('T')[0];
                const dayName = getWeekdayName(current);
                const option = document.createElement('option');
                option.value = dateStr;
                option.textContent = `4月${current.getDate()}日 ${dayName}`;
                select.appendChild(option);
                current.setDate(current.getDate() + 1);
            }
        }

        function renderUpcomingReminders() {
            const container = document.getElementById('upcomingReminders');
            const now = new Date();
            
            const upcoming = allBookings.filter(b => {
                const bookingDateTime = new Date(`${b.date}T${b.timeSlot}:00`);
                const diff = bookingDateTime - now;
                return diff > 0 && diff <= 24 * 60 * 60 * 1000; // 24小时内
            }).sort((a, b) => {
                return new Date(`${a.date}T${a.timeSlot}:00`) - new Date(`${b.date}T${b.timeSlot}:00`);
            });

            if (upcoming.length === 0) {
                container.innerHTML = '<p style="color: #666;">暂无即将开始的课程</p>';
                return;
            }

            container.innerHTML = upcoming.map(booking => {
                const bookingDate = new Date(booking.date + 'T00:00:00');
                const hoursUntil = Math.round((new Date(`${booking.date}T${booking.timeSlot}:00`) - now) / (1000 * 60 * 60));
                
                return `
                    <div class="reminder-item">
                        <div class="reminder-info">
                            <strong>${booking.childName}</strong>
                            <p>4月${bookingDate.getDate()}日 ${booking.timeSlot}:00-${parseInt(booking.timeSlot)+1}:00</p>
                        </div>
                        <div>
                            <span class="badge badge-upcoming">${hoursUntil}小时后</span>
                            ${!booking.reminderSet ? `<button class="btn btn-success" style="margin-left: 10px; padding: 5px 10px; font-size: 0.8rem;" onclick="setReminder('${booking.id}')">提醒家长</button>` : '<span class="badge badge-reminded">已提醒</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setReminder(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking) {
                booking.reminderSet = true;
                saveBookings();
                alert(`已发送提醒短信给${booking.parentName}家长！\n\n提醒内容：\n亲爱的家长，孩子"${booking.childName}"的稿件指导课将于今晚${booking.timeSlot}开始，请提前做好准备，准时参加！\n\n（技术说明：实际短信发送需接入短信平台）`);
                renderStats();
                renderUpcomingReminders();
            }
        }

        function applyFilters() {
            renderBookingList();
        }

        function resetFilters() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterSlot').value = '';
            document.getElementById('searchKeyword').value = '';
            renderBookingList();
        }

        function renderBookingList() {
            const container = document.getElementById('bookingList');
            const filterDate = document.getElementById('filterDate').value;
            const filterSlot = document.getElementById('filterSlot').value;
            const search = document.getElementById('searchKeyword').value.toLowerCase();

            let filtered = allBookings;

            if (filterDate) {
                filtered = filtered.filter(b => b.date === filterDate);
            }

            if (filterSlot) {
                filtered = filtered.filter(b => b.timeSlot === filterSlot);
            }

            if (search) {
                filtered = filtered.filter(b => 
                    b.childName.toLowerCase().includes(search) ||
                    b.parentName.toLowerCase().includes(search) ||
                    b.phone.includes(search)
                );
            }

            // 按日期和时间排序
            filtered.sort((a, b) => {
                if (a.date !== b.date) {
                    return new Date(a.date) - new Date(b.date);
                }
                return parseInt(a.timeSlot) - parseInt(b.timeSlot);
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                        <h3>暂无预约数据</h3>
                        <p>${allBookings.length === 0 ? '等待家长预约...' : '没有符合条件的预约'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(booking => {
                const dateObj = new Date(booking.date + 'T00:00:00');
                const dateStr = `4月${dateObj.getDate()}日 ${getWeekdayName(dateObj)}`;
                
                return `
                    <div class="booking-item">
                        <div class="booking-info">
                            <h4>${booking.childName}</h4>
                            <p>${booking.course || '稿件指导课'}</p>
                        </div>
                        <div class="booking-date">
                            <div class="date">${dateStr}</div>
                            <div class="time">${booking.timeSlot}:00 - ${parseInt(booking.timeSlot) + 1}:00</div>
                        </div>
                        <div class="booking-contact">
                            <p>家长：${booking.parentName}</p>
                            <p>电话：${booking.phone}</p>
                            ${booking.reminderSet ? '<span class="badge badge-reminded">已提醒</span>' : ''}
                        </div>
                        <div class="booking-actions">
                            <button class="btn btn-primary" onclick="sendReminder('${booking.id}')">发送提醒</button>
                            <button class="btn btn-danger" onclick="showDeleteModal('${booking.id}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function sendReminder(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking) {
                booking.reminderSet = true;
                saveBookings();
                alert(`提醒短信已发送！\n\n发送给：${booking.parentName}\n手机号：${booking.phone}\n孩子姓名：${booking.childName}\n课程时间：${booking.date} ${booking.timeSlot}:00\n\n（技术说明：实际短信发送需接入短信平台）`);
                renderStats();
                renderUpcomingReminders();
                renderBookingList();
            }
        }

        function showDeleteModal(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking) {
                deleteTargetId = bookingId;
                document.getElementById('deleteMessage').textContent = 
                    `确定要删除 "${booking.childName}" 的预约吗？\n日期：${booking.date} ${booking.timeSlot}:00`;
                document.getElementById('deleteModal').classList.add('show');
            }
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deleteTargetId = null;
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            if (deleteTargetId) {
                allBookings = allBookings.filter(b => b.id !== deleteTargetId);
                saveBookings();
                closeDeleteModal();
                renderStats();
                renderUpcomingReminders();
                renderBookingList();
            }
        });

        function exportData() {
            if (allBookings.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            let csv = '\uFEFF'; // BOM for Excel
            csv += '孩子姓名,家长姓名,联系电话,稿件名称,预约日期,预约时段,预约时间,是否已提醒\n';
            
            allBookings.forEach(b => {
                csv += `"${b.childName}","${b.parentName}","${b.phone}","${b.course || ''}","${b.date}","${b.timeSlot}:00-${parseInt(b.timeSlot)+1}:00","${b.createdAt}","${b.reminderSet ? '是' : '否'}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `朗声语言预约数据_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // 每分钟刷新一次数据
        setInterval(() => {
            if (localStorage.getItem(ADMIN_KEY) === 'true') {
                loadBookings();
                renderStats();
                renderUpcomingReminders();
            }
        }, 60000);

        init();
    </script>
</body>
</html>
